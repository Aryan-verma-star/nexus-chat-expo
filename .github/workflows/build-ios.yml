name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Clean old pods
        run: |
          rm -rf ios/Pods
          rm -rf ios/build
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..
        
      - name: Build iOS
        run: |
          cd ios
          xcodebuild -workspace NexusChatHub.xcworkspace -scheme NexusChatHub -configuration Release -destination 'generic/platform=iOS Simulator' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ios-build
          path: ios/build/Build/Products/Release-iphoneos/NexusChatHub.app
