# ios/Podfile

require_relative '../node_modules/react-native/scripts/react_native_pods'
require_relative '../node_modules/@react-native-community/cli-platform-ios/native_modules'

platform :ios, '15.1'  # or whatever your minimum is

target 'NexusChatHub' do
  config = use_native_modules!
  use_react_native!(:path => config[:reactNativePath])

  # ... your existing pods ...

  post_install do |installer|
    react_native_post_install(installer)

    # ── THIS IS THE FIX ──
    installer.pods_project.targets.each do |target|
      target.build_configurations.each do |config|
        # Disable strict Swift concurrency checks for ALL pods
        config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
        config.build_settings['SWIFT_VERSION'] = '5.9'
        # Suppress concurrency warnings treated as errors
        config.build_settings['OTHER_SWIFT_FLAGS'] ||= ['$(inherited)']
        unless config.build_settings['OTHER_SWIFT_FLAGS'].include?('-Xfrontend')
          config.build_settings['OTHER_SWIFT_FLAGS'] << '-Xfrontend'
          config.build_settings['OTHER_SWIFT_FLAGS'] << '-disable-upcoming-feature'
          config.build_settings['OTHER_SWIFT_FLAGS'] << '-Xfrontend'
          config.build_settings['OTHER_SWIFT_FLAGS'] << 'StrictConcurrency'
        end
      end
    end
  end
end
